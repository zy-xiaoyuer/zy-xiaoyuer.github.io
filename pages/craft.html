<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>工艺制作 - 华影录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        .app-wrap{
            max-width: 430px;
            max-height: 932px;
            width: min(100vw, calc(100vh * 430 / 932));
            height: min(100vh, calc(100vw * 932 / 430));
            overflow: hidden;
            position: relative;
            background-color: #f5efe0;
            background-image: url("../assets/images/bg-paper.png");
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            padding: 6vh 2vw calc(14vh + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .craft-title {
            width: clamp(200px,80%,320px);
            height: auto;
            margin-bottom: 3vh;
            animation: zMove 4s ease-in-out infinite alternate;
        }
        @keyframes zMove {
            0% { transform: translateX(-15px); }
            100% { transform: translateX(15px); }
        }

        .wrap-center {
            width: clamp(220px,82%,310px);
            aspect-ratio: 1 / 1;
            position: relative;
            margin: auto 0;
        }

        .tab-btn {
            position: absolute;
            width: clamp(50px,18vw,70px);
            height: auto;
            cursor: pointer;
        }
        #tab1 { top: 0; left: 0; }
        #tab2 { top: 0; right: 0; }
        #tab3 { bottom: 0; left: 0; }
        #tab4 { bottom: 0; right: 0; }

        .craft-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 75%;
        }
        .step-item {
            width: 100%;
            height: auto;
            display: none;
            opacity: 0;
            transform: translateY(-30px);
            transition: all 1.2s ease-out;
        }
        .step-item.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .nav-buttons {
            width: 100%;
            max-width: 320px;
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
            margin-top: 3vh;
        }
        .btn {
            width: clamp(100px,32vw,130px);
            height: auto;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .btn:active {
            transform: scale(0.92);
        }

        @keyframes run {
            0% { transform: translateX(-50%) translateY(0) rotate(-5deg); }
            50% { transform: translateX(-50%) translateY(-4px) rotate(5deg); }
            100% { transform: translateX(-50%) translateY(0) rotate(-5deg); }
        }
        .nav-wrap {
            position: absolute;
            bottom: calc(3vh + env(safe-area-inset-bottom));
            left: 0;
            width: 100%;
            padding: 0 12px;
        }
        .progress-bar-box {
            width: 100%;
            max-width: 400px;
            height: 10px;
            background: #c9b99c;
            border-radius: 99px;
            display: flex;
            margin: 0 auto;
            position: relative;
        }
        .progress-item {
            flex: 1;
            height: 100%;
            cursor: pointer;
            position: relative;
        }
        .nav-fox {
            width: clamp(24px,7vw,36px);
            height: clamp(24px,7vw,36px);
            background-image: url("../assets/images/icon.png");
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            position: absolute;
            bottom: 10px;
            z-index: 2;
            transition: left 0.5s ease;
            animation: run 0.35s infinite ease-in-out;
        }
        .progress-item::after {
            content: attr(data-name);
            position: absolute;
            top: 22px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-size: clamp(8px,2vw,11px);
            color: #553e2c;
        }
    </style>
</head>

<body>
    <div class="app-wrap">
        <img src="../assets/images/craft/title-craft.png" class="craft-title">

        <div class="wrap-center">
            <img src="../assets/images/craft/tab1-gray.png" id="tab1" class="tab-btn" onclick="goToTab(1)">
            <img src="../assets/images/craft/tab2-gray.png" id="tab2" class="tab-btn" onclick="goToTab(2)">
            <img src="../assets/images/craft/tab3-gray.png" id="tab3" class="tab-btn" onclick="goToTab(3)">
            <img src="../assets/images/craft/tab4-gray.png" id="tab4" class="tab-btn" onclick="goToTab(4)">

            <div class="craft-content">
                <img src="../assets/images/craft/step1.png" class="step-item active" id="img1">
                <img src="../assets/images/craft/step2.png" class="step-item" id="img2">
                <img src="../assets/images/craft/step3.png" class="step-item" id="img3">
                <img src="../assets/images/craft/step4.png" class="step-item" id="img4">
                <img src="../assets/images/craft/step5.png" class="step-item" id="img5">
            </div>
        </div>

        <div class="nav-buttons">
            <img src="../assets/images/btn-prev.png" class="btn" onclick="prevStep()">
            <img src="../assets/images/btn-next.png" class="btn" onclick="nextStep()">
        </div>

        <div class="nav-wrap">
            <div class="progress-bar-box">
                <div class="progress-item" data-name="首页" data-href="../index.html"></div>
                <div class="progress-item" data-name="引言" data-href="./intro.html"></div>
                <div class="progress-item" data-name="历史溯源" data-href="./history.html"></div>
                <div class="progress-item" data-name="工艺制作" data-href="./craft.html">
                    <div class="nav-fox"></div>
                </div>
                <div class="progress-item" data-name="流派特色" data-href="./style.html"></div>
                <div class="progress-item" data-name="光影新创" data-href="./innovation.html"></div>
                <div class="progress-item" data-name="互动体验" data-href="./pintu.html"></div>
            </div>
        </div>
    </div>

    <script>
        let currentStep = 1;

        function refreshUI() {
            for (let i = 1; i <= 5; i++) {
                document.getElementById('img' + i).classList.remove('active');
            }
            document.getElementById('img' + currentStep).classList.add('active');

            document.getElementById('tab1').src = "../assets/images/craft/tab1-gray.png";
            document.getElementById('tab2').src = "../assets/images/craft/tab2-gray.png";
            document.getElementById('tab3').src = "../assets/images/craft/tab3-gray.png";
            document.getElementById('tab4').src = "../assets/images/craft/tab4-gray.png";

            if (currentStep >= 2) document.getElementById('tab1').src = "../assets/images/craft/tab1.png";
            if (currentStep >= 3) {
                document.getElementById('tab1').src = "../assets/images/craft/tab1.png";
                document.getElementById('tab2').src = "../assets/images/craft/tab2.png";
            }
            if (currentStep >= 4) {
                document.getElementById('tab1').src = "../assets/images/craft/tab1.png";
                document.getElementById('tab2').src = "../assets/images/craft/tab2.png";
                document.getElementById('tab3').src = "../assets/images/craft/tab3.png";
            }
            if (currentStep >= 5) {
                document.getElementById('tab1').src = "../assets/images/craft/tab1.png";
                document.getElementById('tab2').src = "../assets/images/craft/tab2.png";
                document.getElementById('tab3').src = "../assets/images/craft/tab3.png";
                document.getElementById('tab4').src = "../assets/images/craft/tab4.png";
            }
        }

        function goToTab(tabNum) {
            switch (tabNum) {
                case 1: currentStep = 2; break;
                case 2: currentStep = 3; break;
                case 3: currentStep = 4; break;
                case 4: currentStep = 5; break;
            }
            refreshUI();
        }

        function nextStep() {
            if (currentStep < 5) {
                currentStep++;
                refreshUI();
            } else {
                window.location.href = "style.html";
            }
        }

        function prevStep() {
            if (currentStep > 1) {
                currentStep--;
                refreshUI();
            } else {
                window.location.href = "history.html";
            }
        }

        refreshUI();

        const items = document.querySelectorAll('.progress-item');
        const fox = document.querySelector('.nav-fox');
        const total = items.length;
        const curIndex = 3;

        function moveFox(idx) {
            const per = 100 / total;
            fox.style.left = per * idx + per / 2 + '%';
        }
        moveFox(curIndex);

        items.forEach((item, idx)=>{
            item.onclick = function(e){
                e.stopPropagation();
                moveFox(idx);
                setTimeout(()=>{
                    window.location.href = this.dataset.href;
                },300)
            }
        })
    </script>
</body>
</html>
