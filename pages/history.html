<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=430, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>历史溯源 - 华影录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .app-wrap{
            width: 430px;
            height: 932px;
            overflow: hidden;
            position: relative;
            background-color: #f5efe0;
            background-image: url("../assets/images/bg-paper.png");
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            background-attachment: fixed;
            padding: 60px 20px 160px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .history-title {
            width: 80%;
            max-width: 320px;
            height: auto;
            margin-bottom: 30px;
            animation: zMove 4s ease-in-out infinite alternate;
        }
        @keyframes zMove {
            0% { transform: translateX(-15px); }
            100% { transform: translateX(15px); }
        }

        .history-content {
            width: 70%;
            max-width: 270px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 9px;
            margin: auto 0;
        }
        @keyframes blindShow {
            0% {
                opacity: 0;
                transform: scaleY(0);
                transform-origin: top center;
            }
            100% {
                opacity: 1;
                transform: scaleY(1);
            }
        }
        .stage-item {
            width: 100%;
            height: auto;
            opacity: 0;
            animation: blindShow 0.6s ease-out forwards;
        }
        .stage-item:nth-child(1){animation-delay:0.3s;}
        .stage-item:nth-child(2){animation-delay:0.7s;}
        .stage-item:nth-child(3){animation-delay:1.1s;}
        .stage-item:nth-child(4){animation-delay:1.5s;}

        .nav-buttons {
            width: 100%;
            max-width: 320px;
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
            margin-top:30px;
        }
        .btn {
            width: 130px;
            height: auto;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .btn:active {
            transform: scale(0.92);
        }

        @keyframes run {
            0% { transform: translateX(-50%) translateY(0) rotate(-5deg); }
            50% { transform: translateX(-50%) translateY(-4px) rotate(5deg); }
            100% { transform: translateX(-50%) translateY(0) rotate(-5deg); }
        }
        .nav-wrap {
            position: absolute;
            bottom: 35px;
            left: 0;
            width: 100%;
            padding: 0 12px;
        }
        .progress-bar-box {
            width: 100%;
            max-width: 400px;
            height: 10px;
            background: #c9b99c;
            border-radius: 99px;
            display: flex;
            margin: 0 auto;
            position: relative;
        }
        .progress-item {
            flex: 1;
            height: 100%;
            cursor: pointer;
            position: relative;
        }
        .nav-fox {
            width: 36px;
            height: 36px;
            background-image: url("../assets/images/icon.png");
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            position: absolute;
            bottom: 10px;
            z-index: 2;
            transition: left 0.5s ease;
            animation: run 0.35s infinite ease-in-out;
        }
        .progress-item::after {
            content: attr(data-name);
            position: absolute;
            top: 22px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-size: 11px;
            color: #553e2c;
        }
    </style>
</head>

<body>
    <div class="app-wrap">
        <img src="../assets/images/history/title-history.png" alt="千年皮影 岁月流变" class="history-title">

        <div class="history-content">
            <img src="../assets/images/history/stage-origin.png" alt="起源" class="stage-item">
            <img src="../assets/images/history/stage-boom.png" alt="兴盛" class="stage-item">
            <img src="../assets/images/history/stage-spread.png" alt="普及" class="stage-item">
            <img src="../assets/images/history/stage-inherit.png" alt="现代传承" class="stage-item">
        </div>

        <div class="nav-buttons">
            <img src="../assets/images/btn-prev.png" alt="上一页" class="btn" onclick="goPrev()">
            <img src="../assets/images/btn-next.png" alt="下一页" class="btn" onclick="goNext()">
        </div>

        <div class="nav-wrap">
            <div class="progress-bar-box">
                <div class="progress-item" data-name="首页" data-href="../index.html"></div>
                <div class="progress-item" data-name="引言" data-href="./intro.html"></div>
                <div class="progress-item" data-name="历史溯源" data-href="./history.html">
                    <div class="nav-fox"></div>
                </div>
                <div class="progress-item" data-name="工艺制作" data-href="./craft.html"></div>
                <div class="progress-item" data-name="流派特色" data-href="./style.html"></div>
                <div class="progress-item" data-name="光影新创" data-href="./innovation.html"></div>
                <div class="progress-item" data-name="互动体验" data-href="./pintu.html"></div>
            </div>
        </div>
    </div>

    <script>
        function goPrev() {
            window.location.href = "./intro.html";
        }
        function goNext() {
            window.location.href = "./craft.html";
        }

        const items = document.querySelectorAll('.progress-item');
        const fox = document.querySelector('.nav-fox');
        const total = items.length;
        const curIndex = 2;

        function moveFox(idx) {
            const per = 100 / total;
            fox.style.left = per * idx + per / 2 + '%';
        }
        moveFox(curIndex);

        items.forEach((item, idx)=>{
            item.onclick = function(e){
                e.stopPropagation();
                moveFox(idx);
                setTimeout(()=>{
                    window.location.href = this.dataset.href;
                },300)
            }
        })
    </script>
</body>
</html>
